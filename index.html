<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Central O.I.M.C.</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select, button { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background-color: #f39c12; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #d35400; }
        .hidden { display: none; }
        .card { background: #3d3d3d; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #f39c12; }
        .historial { text-align: left; background: #000; padding: 10px; border-radius: 5px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; color: #0f0; }
        .admin-panel { border: 2px solid #e74c3c; padding: 15px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ O.I.M.C. Digital</h1>
    
    <!-- LOGIN -->
    <div id="login-section">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="login-user" placeholder="Nombre / Usuario">
        <input type="password" id="login-pin" placeholder="PIN">
        <button onclick="login()">Entrar al Banco</button>
    </div>

    <!-- PANEL DE USUARIO -->
    <div id="user-panel" class="hidden">
        <div class="card">
            <h2 id="display-name">Bienvenido</h2>
            <p>Saldo: <strong id="display-saldo">0</strong> OI</p>
            <p>Social Credit: <strong id="display-sc">0</strong></p>
        </div>

        <h3>💸 Enviar Bizum</h3>
        <select id="receptor-lista"></select>
        <input type="number" id="bizum-monto" placeholder="Cantidad de Oincalias">
        <input type="text" id="bizum-mensaje" placeholder="Mensaje / Concepto">
        <button onclick="enviarBizum()">Confirmar Envío</button>

        <h3>📜 Historial</h3>
        <div id="user-historial" class="historial"></div>
        <button onclick="logout()" style="background:#c0392b; margin-top:20px;">Cerrar Sesión</button>
    </div>

    <!-- PANEL GOBERNADOR (ADMIN) -->
    <div id="admin-panel" class="hidden" class="admin-panel">
        <hr>
        <h2 style="color: #e74c3c;">🏛️ PANEL DE GOBERNADOR</h2>
        <select id="admin-user-list" onchange="verHistorialAjeno()"></select>
        
        <p>Social Credit (S.C.):</p>
        <input type="range" id="sc-range" min="0" max="100" value="70">
        <button onclick="adminAccion('sc')">Guardar Social Credit</button>

        <input type="number" id="admin-monto" placeholder="Cantidad de Oincalias">
        <button onclick="adminAccion('sueldo')" style="background:#27ae60;">💰 Pagar Sueldo</button>
        <button onclick="adminAccion('impuesto')" style="background:#2980b9;">📑 Cobrar Impuesto</button>
        
        <h3>👁️ Historial Maestro</h3>
        <div id="admin-historial" class="historial"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxAztI4oychmNZ_prwcuQcR_fVSkAzpEmJ7hxu2OVFh3x3vE46D-MFLKOZjAc4Jq0Nq/exec'; // <--- PEGA AQUÍ TU URL /exec
    let datosGlobales = [];
    let usuarioActual = null;

    async function cargarDatos() {
        const response = await fetch(scriptURL);
        datosGlobales = await response.json();
        poblarListas();
    }

    function poblarListas() {
        const selectBizum = document.getElementById('receptor-lista');
        const selectAdmin = document.getElementById('admin-user-list');
        selectBizum.innerHTML = '<option value="">Seleccionar destinatario...</option>';
        selectAdmin.innerHTML = '<option value="">Seleccionar ciudadano...</option>';
        
        datosGlobales.forEach(u => {
            if (u.usuario !== "Banco-OIMC") {
                selectBizum.innerHTML += `<option value="${u.usuario}">${u.usuario}</option>`;
                selectAdmin.innerHTML += `<option value="${u.usuario}">${u.usuario}</option>`;
            }
        });
    }

    function login() {
        const user = document.getElementById('login-user').value;
        const pin = document.getElementById('login-pin').value;
        const cuenta = datosGlobales.find(u => u.usuario === user && String(u.pin) === pin);

        if (cuenta) {
            usuarioActual = cuenta;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('user-panel').classList.remove('hidden');
            actualizarInterfaz();
            if (cuenta.rol === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
        } else {
            alert("Usuario o PIN incorrecto. El sistema de seguridad ha registrado este intento.");
        }
    }

    function actualizarInterfaz() {
        const u = datosGlobales.find(x => x.usuario === usuarioActual.usuario);
        document.getElementById('display-name').innerText = u.usuario;
        document.getElementById('display-saldo').innerText = u.saldo;
        document.getElementById('display-sc').innerText = u.sc;
        document.getElementById('user-historial').innerText = u.historial || "Sin movimientos registrados.";
    }

    async function enviarBizum() {
        const receptor = document.getElementById('receptor-lista').value;
        const monto = document.getElementById('bizum-monto').value;
        const mensaje = document.getElementById('bizum-mensaje').value;

        if (!receptor || monto <= 0) return alert("Datos inválidos");

        await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ tipo: 'bizum', usuario: usuarioActual.usuario, receptor, monto, mensaje })
        });
        alert("Bizum enviado con éxito 🚀");
        location.reload();
    }

    async function adminAccion(tipoAccion) {
        const objetivo = document.getElementById('admin-user-list').value;
        let valor = 0;

        if (tipoAccion === 'sc') valor = document.getElementById('sc-range').value;
        else valor = document.getElementById('admin-monto').value;

        if (!objetivo || valor === "") return alert("Selecciona un usuario y cantidad");

        await fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify({ tipo: 'admin_accion', accion: tipoAccion, usuario: objetivo, valor: parseFloat(valor) })
        });
        alert("Acción de Estado completada 🏛️");
        location.reload();
    }

    function verHistorialAjeno() {
        const objetivo = document.getElementById('admin-user-list').value;
        const u = datosGlobales.find(x => x.usuario === objetivo);
        document.getElementById('admin-historial').innerText = u ? u.historial : "";
    }

    function logout() { location.reload(); }
    
    // Cargar datos al iniciar
    cargarDatos();
</script>

</body>
</html>
