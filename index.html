<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>O.I.M.C. - Sistema Central</title>
</head>
<body style="margin:0; background-color: #f0f2f5;">

    <div id="oimc-news-system" style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; background: #f8f9fa; font-family: sans-serif; border-bottom: 4px solid #2c3e50; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        
        <div style="flex: 2; background: white; padding: 25px; border-radius: 12px; min-width: 300px; border: 1px solid #e0e0e0;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px;">
                <h2 style="margin: 0; color: #2c3e50;">📰 COMUNICADOS O.I.M.C.</h2>
                <span id="role-badge" style="background: #bdc3c7; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">LECTURA</span>
            </div>
            
            <div id="news-feed" style="max-height: 300px; overflow-y: auto;">
                <div style="padding: 15px; background: #fff3cd; border-left: 5px solid #ffc107; border-radius: 4px; margin-bottom: 15px; color: #333;">
                    <strong>[NOTICIA DE PAZ]</strong>
                    <p style="margin: 5px 0;">La web ha sido actualizada. Iñaki sigue bajo custodia.</p>
                </div>
            </div>

            <div id="admin-editor" style="display: none; margin-top: 25px; padding: 20px; background: #e9f7ef; border-radius: 10px; border: 1px dashed #27ae60;">
                <h3 style="margin-top: 0; color: #218838;">✍️ Redactar Orden</h3>
                <input type="text" id="news-title" placeholder="Título..." style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <textarea id="news-body" placeholder="Mensaje..." style="width: 100%; padding: 10px; height: 60px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px;"></textarea>
                <button onclick="addNews()" style="width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold;">PUBLICAR</button>
            </div>
        </div>

        <div style="flex: 1; min-width: 240px; background: #2c3e50; color: white; padding: 25px; border-radius: 12px; text-align: center;">
            <h3 style="border-bottom: 1px solid #555; padding-bottom: 10px;">🔐 ACCESO</h3>
            <input type="text" id="user-input" placeholder="Usuario..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: none;">
            <button onclick="loginSystem()" style="width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">ACCEDER</button>
            <p id="login-status" style="margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        function loginSystem() {
            const user = document.getElementById('user-input').value.trim().toLowerCase();
            const editor = document.getElementById('admin-editor');
            const badge = document.getElementById('role-badge');
            const status = document.getElementById('login-status');

            if (user === 'juan') {
                editor.style.display = 'block';
                badge.innerText = "ADMINISTRADOR";
                badge.style.background = "#27ae60";
                status.innerText = "✅ Sesión: Gobernador Juan";
                status.style.color = "#2ecc71";
            } else if (user !== "") {
                editor.style.display = 'none';
                badge.innerText = "USUARIO: " + user.toUpperCase();
                badge.style.background = "#3498db";
                status.innerText = "👤 Usuario: " + user;
                status.style.color = "#3498db";
            }
        }

        function addNews() {
            const t = document.getElementById('news-title').value;
            const b = document.getElementById('news-body').value;
            if (t && b) {
                const feed = document.getElementById('news-feed');
                const item = document.createElement('div');
                item.style = "padding: 15px; background: #e3f2fd; border-left: 5px solid #2196f3; border-radius: 4px; margin-bottom: 15px; color: #333;";
                item.innerHTML = `<strong>[COMUNICADO] ${t}</strong><p style="margin: 5px 0;">${b}</p><small style="color: #777;">Por: Gobernador Juan</small>`;
                feed.prepend(item);
                document.getElementById('news-title').value = '';
                document.getElementById('news-body').value = '';
            }
        }
    </script>
</body>
</html>
