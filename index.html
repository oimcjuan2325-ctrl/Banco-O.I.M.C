<script>
    // Sistema de Autenticación para el Gobernador
    function checkAuth() {
        const user = document.getElementById('user-login').value.toLowerCase();
        if (user === 'juan') {
            document.getElementById('admin-news-btn').style.display = 'block';
            const status = document.getElementById('status-msg');
            status.innerText = "¡Bienvenido, Juan!";
            status.style.color = "#2ecc71";
        }
    }

    function toggleNewsForm() {
        const form = document.getElementById('news-form');
        // Corrección del interruptor de visibilidad
        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
        } else {
            form.style.display = 'none';
        }
    }

    function postNews() {
        const title = document.getElementById('news-title').value;
        const body = document.getElementById('news-body').value;
        if (title && body) {
            const feed = document.getElementById('news-feed');
            const newItem = document.createElement('div');
            newItem.style = "margin-bottom: 15px; padding: 10px; background: #e1f5fe; border-radius: 8px; border-left: 4px solid #03a9f4; color: #333;";
            newItem.innerHTML = `<h4 style="margin: 0 0 5px 0;">${title}</h4><p style="margin: 0; font-size: 0.9rem;">${body}</p>`;
            feed.prepend(newItem);
            
            // Limpiar y cerrar
            document.getElementById('news-title').value = '';
            document.getElementById('news-body').value = '';
            toggleNewsForm();
        }
    }
</script>
