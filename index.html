<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.I.M.C. Central Bank</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 10px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 45%; margin: 5px; color: white; }
        .btn-red { background: #ff4757; } .btn-green { background: #2ed573; } .btn-purple { background: #5352ed; width: 94%; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        #admin-zone { display: none; margin-top: 30px; border: 2px solid #eccc68; padding: 15px; border-radius: 15px; }
        iframe { width: 100%; height: 200px; border: none; margin-top: 15px; background: white; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏛️ Banco O.I.M.C.</h1>
    
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTvTQTV_rKwPoMfZ75lh_b3_ScvJYD74zt3GksK0mvB8lk64Z0SlSMAxXHxigqJL7CUUt8H8OJVkK5p/pub?output=csv"></iframe>

    <div style="margin-top: 15px;">
        <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeA403BSPl4lDWCu3kkPsHBXY9keYJGXgwLLhnSyov3oB0lyw/viewform?usp=header')" class="btn btn-red">RETIRAR (-)</button>
        <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScYctqaLnfL9BQbHYYBvmrUWhLeciCN2kRVbS5i9w9R49-a1Q/viewform?usp=header')" class="btn btn-green">INGRESAR (+)</button>
    </div>

    <div style="background: #333; padding: 15px; border-radius: 15px; margin-top: 15px;">
        <h3>📲 Bizum Instantáneo</h3>
        <input type="text" id="b-emisor" placeholder="Tu Nombre">
        <input type="password" id="b-pin" placeholder="Tu PIN">
        <input type="text" id="b-receptor" placeholder="¿A quién envías?">
        <input type="number" id="b-cantidad" placeholder="Cantidad OI">
        <button onclick="realizarBizum()" class="btn btn-purple">ENVIAR BIZUM</button>
    </div>

    <button onclick="accesoAdmin()" style="background:none; border:none; color:#555; margin-top:20px; font-size:10px;">ACCESO GOBERNADOR</button>

    <div id="admin-zone">
        <h2 style="color:#eccc68">👑 PANEL DE MANDO</h2>
        <input type="text" id="a-user" placeholder="Nombre Ciudadano">
        
        <div style="background:#444; padding:10px; border-radius:10px;">
            <label>Social Credit: <span id="sc-val">70</span></label>
            <input type="range" min="0" max="100" value="70" oninput="actualizarSC(this.value)">
            <p>Sueldo: <span id="a-sueldo">4</span> OI</p>
            <button onclick="alert('SC Guardado')" style="background:#eccc68; border:none; padding:5px; width:100%">GUARDAR SC</button>
        </div>

        <div style="display:flex; margin-top:10px;">
            <button onclick="alert('Sueldo Pagado')" class="btn btn-green">PAGAR SUELDO</button>
            <button onclick="alert('Impuesto Cobrado')" class="btn btn-red">COBRAR IMPUESTO</button>
        </div>
    </div>
</div>

<script>
    function realizarBizum() {
        const emisor = document.getElementById('b-emisor').value;
        const pin = document.getElementById('b-pin').value;
        const receptor = document.getElementById('b-receptor').value;
        const cantidad = document.getElementById('b-cantidad').value;
        
        if(!emisor || !pin || !receptor || !cantidad) {
            alert("Rellena todos los campos del Bizum");
            return;
        }
        // Nota: Aquí se conectaría con google.script.run para ser 100% automático
        alert("¡Orden de Bizum enviada! Revisando saldo y PIN...");
    }

    function accesoAdmin() {
        let p = prompt("Contraseña de Gobernador:");
        if(p === "OIMC2026") document.getElementById('admin-zone').style.display = 'block';
    }

    function actualizarSC(v) {
        document.getElementById('sc-val').innerText = v;
        let s = v >= 90 ? 5 : v >= 70 ? 4 : v >= 50 ? 2 : 0;
        document.getElementById('a-sueldo').innerText = s;
    }
</script>

</body>
</html>
